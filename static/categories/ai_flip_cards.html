<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stance Flip Cards</title>
<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  margin: 0;
  background: #faf7f3;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}
.card {
  perspective: 1000px;
}
.card-inner {
  position: relative;
  width: 100%;
  height: 300px;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  cursor: pointer;
}
.card.flipped .card-inner {
  transform: rotateY(180deg);
}
.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  padding: 16px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.card-back {
  transform: rotateY(180deg);
  background: #fff;
}
.title {
  font-size: 18px;
  font-weight: bold;
}
.quote {
  font-size: 14px;
}
.names {
  overflow-y: auto;
  font-size: 13px;
}
.icon {
  width: 32px;
  height: 32px;
}
</style>
</head>
<body>
<div class="container">
<h1>Flip the card to see who’s behind each label</h1>
<div class="grid" id="grid"></div>
</div>

<script>
const categories = [
  {
    name: "Extinctionists",
    quote: "It's fine, or good, if AI kills us.",
    color: "#e8c2ba",
    icon: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2 L2 22 H22 Z" fill="currentColor"/></svg>',
    people: ["Richard Sutton","Larry Page","Jürgen Schmidhuber","Hugo de Garis","Robin Hanson"]
  },
  {
    name: "Optimistic Accelerationists",
    quote: "We should race ahead on AI.",
    color: "#ead5cf",
    icon: '<svg class="icon" viewBox="0 0 24 24"><path d="M2 12 L22 2 L12 22 Z" fill="currentColor"/></svg>',
    people: ["Mark Zuckerberg","Yann LeCun","Andrew Ng","Greg Brockman","Jensen Huang"]
  },
  {
    name: "Centrists",
    quote: "Moderate regulation.",
    color: "#e5dbda",
    icon: '<svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="currentColor"/></svg>',
    people: ["Sundar Pichai","Satya Nadella","Fei-Fei Li","Ray Kurzweil"]
  },
  {
    name: "Delayists",
    quote: "Ban or align AI.",
    color: "#ecd7e8",
    icon: '<svg class="icon" viewBox="0 0 24 24"><rect x="6" y="2" width="4" height="20" fill="currentColor"/><rect x="14" y="2" width="4" height="20" fill="currentColor"/></svg>',
    people: ["Geoff Hinton","Demis Hassabis","Frank Wilczek"]
  }
];

const grid = document.getElementById("grid");

categories.forEach(cat => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-face" style="background:${cat.color}">
        <div>
          ${cat.icon}
          <div class="title">${cat.name}</div>
        </div>
        <div class="quote">${cat.quote}</div>
        <div>Tap to flip</div>
      </div>
      <div class="card-face card-back">
        <div class="title">${cat.name}</div>
        <div class="names">${cat.people.join("<br>")}</div>
        <div>Tap to return</div>
      </div>
    </div>
  `;

  card.addEventListener("click", () => {
    card.classList.toggle("flipped");
  });

  grid.appendChild(card);
});
</script>
</body>
</html>
