<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stance Flip Cards</title>
<style>
body{font-family:system-ui;margin:0;background:#faf7f3}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.card{perspective:1000px}
.card-inner{position:relative;height:320px;transition:.5s;transform-style:preserve-3d}
.card.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;padding:16px;display:flex;flex-direction:column;justify-content:space-between}
.back{transform:rotateY(180deg);background:#fff}
button{cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:#fff;padding:20px;border-radius:16px;max-width:500px;width:90%}
</style>
</head>
<body>
<div class="container">
<h1>AI stance map (after Rob Bensinger)</h1>
<p>This page is an interactive rendering of a category map originally posted by Rob Bensinger. Names and labels are his; commentary here is interpretive.</p>
<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const categories=[
{name:"Extinctionists",color:"#e8c2ba",desc:"Provocative label capturing arguments that extinction risk may be acceptable relative to long-term outcomes."},
{name:"Optimistic Accelerationists",color:"#ead5cf",desc:"Emphasizes rapid AI progress as broadly beneficial and manageable."},
{name:"Centrists",color:"#e5dbda",desc:"Supports development with moderate regulation and guardrails."},
{name:"Delayists",color:"#ecd7e8",desc:"Sees both slowing and alignment as viable approaches."}
];

const grid=document.getElementById("grid");

categories.forEach(c=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
  <div class="card-inner">
    <div class="face" style="background:${c.color}">
      <div>${c.name}</div>
      <button onclick="event.stopPropagation();openModal('${c.name}','${c.desc}')">about this category</button>
    </div>
    <div class="face back">${c.name}</div>
  </div>`;
  card.onclick=()=>card.classList.toggle("flipped");
  grid.appendChild(card);
});

function openModal(title,text){
  document.getElementById("modalTitle").innerText=title;
  document.getElementById("modalText").innerText=text;
  document.getElementById("modal").classList.add("active");
}
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}
</script>
</body>
</html>
