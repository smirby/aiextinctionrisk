{{ define "main" }}
<article class="home">
  {{ .Content }}

  {{ with .Site.Params.status }}
    {{ if eq . "forthcoming" }}
    <p class="status-note">Publication details forthcoming{{ if $.Site.Params.show_publisher }} from {{ $.Site.Params.publisher }}{{ end }}.</p>
    {{ end }}
  {{ end }}

</article>
{{ end }}
