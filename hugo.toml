baseURL = "https://fromtooltoactor.ca/"
languageCode = "en-ca"
title = "From Tool to Actor: Artificial Intelligence and Human Extinction Risk"

# We're using layouts directly (no external theme) so the site's
# look and feel can be updated easily once the book design arrives.

[params]
  authors = "William Leiss and Richard Smith"
  publisher = "McGill-Queen's University Press"
  show_publisher = false
  description = "Companion website for From Tool to Actor: Artificial Intelligence and Human Extinction Risk by William Leiss and Richard Smith"
  status = "forthcoming"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "About the Book"
    url = "/about/book/"
    weight = 2
  [[menu.main]]
    name = "Authors"
    url = "/about/authors/"
    weight = 3
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 4
  [[menu.main]]
    name = "Governance"
    url = "/governance/"
    weight = 5
  [[menu.main]]
    name = "Resources"
    url = "/about/resources/"
    weight = 6
  [[menu.main]]
    name = "Errata"
    url = "/about/errata/"
    weight = 7

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "monokai"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
